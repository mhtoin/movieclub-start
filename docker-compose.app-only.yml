# docker-compose.app-only.yml
# Use this when postgres is running as an external service.
# Requires DATABASE_URL to be set in .env.production pointing to the external database.
#
# Usage: docker compose -f docker-compose.app-only.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movieclub-app-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      SESSION_PASSWORD: ${SESSION_PASSWORD:?Session password required}
      BASE_URL: ${BASE_URL:?BASE_URL required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY required}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM required}
      VITE_TMDB_API_KEY: ${VITE_TMDB_API_KEY:?TMDB API key required}
      VITE_TMDB_BASE_URL: ${VITE_TMDB_BASE_URL:-https://api.themoviedb.org/3}
      VITE_TMDB_IMAGE_BASE_URL: ${VITE_TMDB_IMAGE_BASE_URL:-https://image.tmdb.org/t/p}
    ports:
      - "3001:3001"
