# docker-compose.prod.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: movieclub-postgres-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-movieclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-movieclub}
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-movieclub} -d ${POSTGRES_DB:-movieclub}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movieclub-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TMDB_API_KEY: ${VITE_TMDB_API_KEY}
        VITE_TMDB_BASE_URL: ${VITE_TMDB_BASE_URL:-https://api.themoviedb.org/3}
        VITE_TMDB_IMAGE_BASE_URL: ${VITE_TMDB_IMAGE_BASE_URL:-https://image.tmdb.org/t/p}
    container_name: movieclub-app-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-movieclub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-movieclub}?sslmode=disable
      SESSION_PASSWORD: ${SESSION_PASSWORD:?Session password required}
      BASE_URL: ${BASE_URL:?BASE_URL required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY required}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM required}
      VITE_TMDB_API_KEY: ${VITE_TMDB_API_KEY:?TMDB API key required}
      VITE_TMDB_BASE_URL: ${VITE_TMDB_BASE_URL:-https://api.themoviedb.org/3}
      VITE_TMDB_IMAGE_BASE_URL: ${VITE_TMDB_IMAGE_BASE_URL:-https://image.tmdb.org/t/p}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - movieclub-network
    # Expose app on port 3001 for Nginx Proxy Manager to proxy
    ports:
      - "3001:3001"

networks:
  movieclub-network:
    driver: bridge

volumes:
  postgres_data:
